apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: litellm
          image: docker.litellm.ai/berriai/litellm:main-stable
          imagePullPolicy: Always
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
            - "--num_workers"
            - "4"
            - "--run_gunicorn"
          ports:
            - name: http
              containerPort: 4000
            - name: health
              containerPort: 8001
          envFrom:
            - secretRef:
                name: litellm-secrets
            - secretRef:
                name: kiro-gateway-secrets
          env:
            - name: LITELLM_LOG
              value: "ERROR"
            - name: LITELLM_LOCAL_MODEL_COST_MAP
              value: "True"
            # SEPARATE_HEALTH_APP not supported in this version
            # Health checks go through main port 4000
            - name: MAX_REQUESTS_BEFORE_RESTART
              value: "10000"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: plugins
              mountPath: /app/plugins
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: plugins
          configMap:
            name: litellm-plugins
