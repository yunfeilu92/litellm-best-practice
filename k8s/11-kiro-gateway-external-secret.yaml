# ============================================================
# Kiro Gateway - ExternalSecret
# 从 AWS Secrets Manager 同步 kiro refresh token 到 K8s Secret
# ============================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiro-gateway-secrets
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: kiro-gateway-secrets
    creationPolicy: Owner

  dataFrom:
    - extract:
        key: kiro-gateway/config
