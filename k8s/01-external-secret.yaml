# ============================================================
# External Secrets - 从 AWS Secrets Manager 自动同步到 K8s Secret
# ============================================================

---
# ClusterSecretStore：集群级别，可被所有 namespace 引用
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# ExternalSecret：同步 Secrets Manager → K8s Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secrets
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: litellm-secrets
    creationPolicy: Owner

  dataFrom:
    - extract:
        key: litellm/config
