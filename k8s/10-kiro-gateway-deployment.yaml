# ============================================================
# Kiro Gateway - StorageClass + PV + PVC + Deployment + Service
# 提供 OpenAI-compatible API，通过 Kiro (Amazon Q Developer) 访问 Claude 模型
# SQLite 持久化 token，确保 Pod 重启后 refresh_token 不丢失
# 使用 EFS 支持跨节点访问（ReadWriteMany）
# ============================================================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kiro-gateway-efs-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-04974e449cdb136f5

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiro-gateway-data
  namespace: litellm
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-gateway
  namespace: litellm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kiro-gateway
  template:
    metadata:
      labels:
        app: kiro-gateway
    spec:
      terminationGracePeriodSeconds: 30

      # initContainer: 用 Secret 中的初始 token 初始化 SQLite（仅首次）
      initContainers:
        - name: init-kiro-db
          image: python:3.10-slim
          command:
            - python3
            - -c
            - |
              import sqlite3, json, os, sys
              db_path = "/data/kiro/data.sqlite3"
              os.makedirs(os.path.dirname(db_path), exist_ok=True)

              # 如果 DB 已存在且有 token，跳过初始化（保留续期后的 token）
              if os.path.exists(db_path):
                  try:
                      conn = sqlite3.connect(db_path)
                      row = conn.execute(
                          "SELECT value FROM auth_kv WHERE key = 'kirocli:odic:token'"
                      ).fetchone()
                      conn.close()
                      if row:
                          print("SQLite DB already has token, skipping init")
                          sys.exit(0)
                  except Exception:
                      pass  # DB 损坏，重新初始化

              # 从环境变量读取初始 token，写入 SQLite
              refresh_token = os.environ.get("KIRO_INITIAL_REFRESH_TOKEN", "")
              client_id = os.environ.get("KIRO_CLIENT_ID", "")
              client_secret = os.environ.get("KIRO_CLIENT_SECRET", "")

              if not refresh_token:
                  print("ERROR: KIRO_INITIAL_REFRESH_TOKEN not set")
                  sys.exit(1)

              conn = sqlite3.connect(db_path)
              conn.execute("""
                  CREATE TABLE IF NOT EXISTS auth_kv (
                      key TEXT PRIMARY KEY,
                      value TEXT NOT NULL
                  )
              """)

              # 写入 token
              token_data = json.dumps({
                  "refresh_token": refresh_token,
                  "region": os.environ.get("KIRO_REGION", "us-east-1")
              })
              conn.execute(
                  "INSERT OR REPLACE INTO auth_kv (key, value) VALUES (?, ?)",
                  ("kirocli:odic:token", token_data)
              )

              # 写入 device registration（如果有 client_id/secret）
              if client_id and client_secret:
                  device_data = json.dumps({
                      "client_id": client_id,
                      "client_secret": client_secret,
                      "region": os.environ.get("KIRO_REGION", "us-east-1")
                  })
                  conn.execute(
                      "INSERT OR REPLACE INTO auth_kv (key, value) VALUES (?, ?)",
                      ("kirocli:odic:device-registration", device_data)
                  )

              conn.commit()
              conn.close()
              print("SQLite DB initialized with kiro credentials")
          env:
            - name: KIRO_INITIAL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kiro-gateway-secrets
                  key: KIRO_REFRESH_TOKEN
            - name: KIRO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kiro-gateway-secrets
                  key: KIRO_CLIENT_ID
                  optional: true
            - name: KIRO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kiro-gateway-secrets
                  key: KIRO_CLIENT_SECRET
                  optional: true
            - name: KIRO_REGION
              value: "us-east-1"
          volumeMounts:
            - name: kiro-data
              mountPath: /data/kiro

      containers:
        - name: kiro-gateway
          image: 497892281794.dkr.ecr.us-east-1.amazonaws.com/kiro-gateway:latest
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: KIRO_CLI_DB_FILE
              value: "/data/kiro/data.sqlite3"
            - name: PROXY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kiro-gateway-secrets
                  key: KIRO_PROXY_API_KEY
            - name: KIRO_REGION
              value: "us-east-1"
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: kiro-data
              mountPath: /data/kiro

      volumes:
        - name: kiro-data
          persistentVolumeClaim:
            claimName: kiro-gateway-data

---
apiVersion: v1
kind: Service
metadata:
  name: kiro-gateway
  namespace: litellm
spec:
  selector:
    app: kiro-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
