apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    # ============================================================
    # LiteLLM Proxy Config - Claude Code / OpenClaw + AWS Bedrock
    # ============================================================

    model_list:
      # ==== Claude Sonnet 4.6 (Kiro 9 : Bedrock 1) ====
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_base: http://kiro-gateway.litellm.svc.cluster.local:8000
          api_key: os.environ/KIRO_PROXY_API_KEY
          weight: 9
        model_info:
          input_cost_per_token: 0.000003
          output_cost_per_token: 0.000015
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          weight: 1
          rpm: 100
          tpm: 400000
          max_parallel_requests: 20

      # ==== Claude Opus 4.6 (Kiro 9 : Bedrock 1) ====
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_base: http://kiro-gateway.litellm.svc.cluster.local:8000
          api_key: os.environ/KIRO_PROXY_API_KEY
          weight: 9
        model_info:
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.000025
      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          weight: 1
          rpm: 50
          tpm: 200000
          max_parallel_requests: 10

      # ---- Claude Sonnet 4.5 ----
      - model_name: claude-sonnet-4-5
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 100
          tpm: 400000
          max_parallel_requests: 20

      # ---- Claude Opus 4.5 ----
      - model_name: claude-opus-4-5
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-5-20251101-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 50
          tpm: 200000
          max_parallel_requests: 10

      # ---- GPT-4o → Claude Opus 4.6 (视觉替代) ----
      # additional_drop_params 强制丢弃 top_p，避免与 temperature 冲突
      - model_name: gpt-4o
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          additional_drop_params: ["top_p"]
          rpm: 50
          tpm: 200000
          max_parallel_requests: 10

      # ---- Claude Haiku 3.5 (轻量/降级) ----
      - model_name: claude-haiku-3.5
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 200
          tpm: 800000
          max_parallel_requests: 50

      # ---- Claude Haiku 4.5 (Claude Code 内部工具使用) ----
      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: anthropic/claude-haiku-4.5
          api_base: http://kiro-gateway.litellm.svc.cluster.local:8000
          api_key: os.environ/KIRO_PROXY_API_KEY

    router_settings:
      routing_strategy: simple-shuffle
      redis_host: os.environ/REDIS_HOST
      redis_password: os.environ/REDIS_PASSWORD
      redis_port: os.environ/REDIS_PORT
      num_retries: 3
      timeout: 600
      enable_pre_call_checks: true
      allowed_fails: 3
      cooldown_time: 30

    litellm_settings:
      callbacks:
        - plugins.thinking_block_guard.thinking_block_guard
      drop_params: true
      set_verbose: false
      num_retries: 3
      request_timeout: 600
      json_logs: true

      fallbacks:
        - {"claude-sonnet-4-6": ["claude-haiku-3.5"]}

      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        password: os.environ/REDIS_PASSWORD
        supported_call_types: []

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      proxy_batch_write_at: 60
      database_connection_pool_limit: 10
      database_connection_timeout: 60
      disable_error_logs: true
      allow_requests_on_db_unavailable: true
