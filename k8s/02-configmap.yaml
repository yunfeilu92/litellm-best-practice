apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    # ============================================================
    # LiteLLM Proxy Config - Claude Code / OpenClaw + AWS Bedrock
    # ============================================================

    model_list:
      # ---- Claude Sonnet 4.6 ----
      - model_name: claude-sonnet-4-6-20250514
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 100
          tpm: 400000
          max_parallel_requests: 20

      # 别名：Claude Code 会用这个名字请求
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 100
          tpm: 400000
          max_parallel_requests: 20

      # ---- Claude Opus 4.6 ----
      - model_name: claude-opus-4-6-20250514
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 50
          tpm: 200000
          max_parallel_requests: 10

      # 别名：Claude Code 会用这个名字请求
      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 50
          tpm: 200000
          max_parallel_requests: 10

      # ---- Claude Haiku 3.5 (轻量/降级) ----
      - model_name: claude-haiku-3.5
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          rpm: 200
          tpm: 800000
          max_parallel_requests: 50

    router_settings:
      routing_strategy: simple-shuffle
      redis_host: os.environ/REDIS_HOST
      redis_password: os.environ/REDIS_PASSWORD
      redis_port: os.environ/REDIS_PORT
      num_retries: 3
      timeout: 600
      enable_pre_call_checks: true
      allowed_fails: 3
      cooldown_time: 30

    litellm_settings:
      drop_params: true
      set_verbose: false
      num_retries: 3
      request_timeout: 600
      json_logs: true

      fallbacks:
        - {"claude-sonnet-4-6": ["claude-haiku-3.5"]}
        - {"claude-sonnet-4-6-20250514": ["claude-haiku-3.5"]}

      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        password: os.environ/REDIS_PASSWORD
        supported_call_types: []

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      proxy_batch_write_at: 60
      database_connection_pool_limit: 10
      database_connection_timeout: 60
      disable_error_logs: true
      allow_requests_on_db_unavailable: true
