apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    # ============================================================
    # LiteLLM Proxy Config - Claude Code / OpenClaw + AWS Bedrock
    # ============================================================

    model_list:
      # ==== Claude Opus 4.6 (dual AKSK) ====
      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/global.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/global.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_2
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_2
          aws_region_name: us-east-1

      # ==== Claude Sonnet 4.6 (dual AKSK) ====
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/global.anthropic.claude-sonnet-4-6
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
        model_info:
          max_input_tokens: 1000000
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/global.anthropic.claude-sonnet-4-6
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_2
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_2
          aws_region_name: us-east-1
        model_info:
          max_input_tokens: 1000000

      # ==== Claude Haiku 4.5 (dual AKSK) ====
      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_2
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_2
          aws_region_name: us-east-1

      # ---- GPT-4o → Claude Opus 4.6 (视觉替代) ----
      - model_name: gpt-4o
        litellm_params:
          model: bedrock/global.anthropic.claude-opus-4-6-v1
          aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID_1
          aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY_1
          aws_region_name: us-east-1
          additional_drop_params: ["top_p"]

    router_settings:
      routing_strategy: simple-shuffle
      redis_host: os.environ/REDIS_HOST
      redis_password: os.environ/REDIS_PASSWORD
      redis_port: os.environ/REDIS_PORT
      num_retries: 3
      timeout: 600
      enable_pre_call_checks: true
      allowed_fails: 3
      cooldown_time: 30

    litellm_settings:
      # callbacks:
      #   - plugins.thinking_block_guard.thinking_block_guard
      drop_params: true
      set_verbose: false
      num_retries: 3
      request_timeout: 600
      json_logs: true

      fallbacks:
        - {"claude-opus-4-6": ["claude-sonnet-4-6"]}
        - {"claude-sonnet-4-6": ["claude-haiku-4-5-20251001"]}

      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        password: os.environ/REDIS_PASSWORD
        supported_call_types: []

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      proxy_batch_write_at: 60
      database_connection_pool_limit: 10
      database_connection_timeout: 60
      disable_error_logs: true
      allow_requests_on_db_unavailable: true
